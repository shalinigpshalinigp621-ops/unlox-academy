<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <title>Image Tag</title>
  <body>
    <!-- Image Tag - Adding Image on Webpage img tag  src = source/location-->
     <!-- 1.From internet -copy image address and use it click copy image address -->
      <!--1. pexels or unsplash  -->
      <h2>coffee</h2>
      <img src="https://images.pexels.com/photos/3879495/pexels-photo-3879495.jpeg" height="300px" width="400px" alt="nature"><br><br>

      <hr>
      <!-- 2.Download and add from your system  using unsplash or other website click save as image --> 
       <h2>headphones</h2>
       <img src="headphone.avif" height="300px" width="400px" alt="headphone"><br><br>
       <hr>
       <h2>mobile</h2>
       <img src="mobile.avif" height="300px" width="400px" alt="mobile"><br><br>
        <hr>

  </body>
</html>

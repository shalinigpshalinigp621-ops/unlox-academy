<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <title>div tag</title>
  <body>
    <!-- Div tag - it is Block Level tag/100% width of the space by default  -->
     <div style ="background-color:lightyellow;">
      <h2>Menu</h2>
      <ol>
        <li>pizza</li>
        <li>burger</li>
        <li>pasta</li>  
      </ol>


     </div>

     <div style =background-color:mediumaquamarine;>
      <h2>Review</h2>
      <strong>Good Restaurant</strong>
      <p>ratings ⭐⭐⭐⭐⭐</p>
     </div>

     <!-- span tag - Takes only required amount width / Inline tag span tag can be added inside any other html tag  -->
      <span style="background-color:lightpink;">Login</span>
      <button>cart <span>0</span></button>
   
  </body>
  </html>
